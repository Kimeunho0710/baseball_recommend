spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  devtools:
    restart:
      enabled: false

jwt:
  secret: ${JWT_SECRET:baseball-recommend-jwt-secret-key-for-local-dev-only-min-32-chars!!}
  expiration: 86400000  # 24시간 (ms)

server:
  port: ${PORT:8080}

logging:
  level:
    com.baseball.recommend: INFO
