spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  devtools:
    restart:
      enabled: false

jwt:
  secret: ${JWT_SECRET:baseball-recommend-jwt-secret-key-for-local-dev-only-min-32-chars!!}
  access-expiration: 3600000     # 1시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

server:
  port: ${PORT:8080}

gemini:
  api:
    key: ${GEMINI_API_KEY:}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}

groq:
  api:
    key: ${GROQ_API_KEY:}

logging:
  level:
    com.baseball.recommend: INFO
