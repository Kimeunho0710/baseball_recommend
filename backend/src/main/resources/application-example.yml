spring:
  datasource:
    url: jdbc:mysql://localhost:3306/baseball_recommend?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  devtools:
    restart:
      enabled: true

server:
  port: 8080

logging:
  level:
    com.baseball.recommend: DEBUG
    org.hibernate.SQL: DEBUG
